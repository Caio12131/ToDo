<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ToDo List</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 30px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

input {
    width: 70%;
    padding: 10px;
}

button {
    padding: 10px;
    cursor: pointer;
}

.task {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding: 8px;
    background: #eee;
    border-radius: 5px;
}

.completed {
    text-decoration: line-through;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

<h1>📋 Minhas Tarefas</h1>

<input id="title" placeholder="Nova tarefa">
<button onclick="addTask()">Adicionar</button>

<div id="taskList"></div>

</div>

<script>

const apiUrl = "http://localhost:5092/api/tasks";

async function loadTasks() {

    const response = await fetch(apiUrl);
    const tasks = await response.json();

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {

        const div = document.createElement("div");
        div.className = "task";

        if (task.isCompleted)
            div.classList.add("completed");

        div.innerHTML = `
            <span onclick="toggleTask(${task.id}, '${task.title}', ${task.isCompleted})">
                ${task.title}
            </span>

            <button onclick="deleteTask(${task.id})">
                ❌
            </button>
        `;

        list.appendChild(div);

    });
}

async function addTask() {

    const titleInput = document.getElementById("title");

    const task = {
        title: titleInput.value,
        isCompleted: false
    };

    await fetch(apiUrl, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(task)
    });

    titleInput.value = "";

    loadTasks();
}

async function toggleTask(id, title, isCompleted) {

    const updatedTask = {
        id: id,
        title: title,
        isCompleted: !isCompleted
    };

    await fetch(`${apiUrl}/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(updatedTask)
    });

    loadTasks();
}

async function deleteTask(id) {

    await fetch(`${apiUrl}/${id}`, {
        method: "DELETE"
    });

    loadTasks();
}

loadTasks();

</script>

</body>
</html>
